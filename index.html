<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biodata Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --maroon:#5B1220;
    --maroon-deep:#3E0C16;
    --gold:#B8863C;
    --gold-light:#D9B872;
    --emerald:#1F4E42;
    --ivory:#FBF6EA;
    --cream:#F3E8D0;
    --ink:#2A1B12;
    --paper-shadow:rgba(53,34,20,0.22);
    --muted:#8A7A63;
    --toolbar:#203A34;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 18% 8%, rgba(217,184,114,0.22), transparent 28%),
      radial-gradient(circle at 82% 18%, rgba(31,78,66,0.13), transparent 30%),
      linear-gradient(180deg,#fffaf0 0%, var(--cream) 100%);
    font-family:'Mulish',sans-serif;
    color:var(--ink);
  }

  /* ---------- Toolbar ---------- */
  .toolbar{
    position:sticky;
    top:0;
    z-index:50;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
    padding:14px 24px;
    background:rgba(32,58,52,0.94);
    backdrop-filter:blur(6px);
    border-bottom:1px solid rgba(184,134,60,0.35);
  }
  .toolbar-brand{
    font-family:'Cormorant Garamond',serif;
    font-size:22px;
    font-weight:600;
    color:var(--gold-light);
    letter-spacing:0.5px;
  }
  .toolbar-brand span{color:#e8ddc7;font-weight:500;}
  .toolbar-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .btn{
    font-family:'Mulish',sans-serif;
    font-size:13px;
    font-weight:700;
    letter-spacing:0.3px;
    padding:9px 16px;
    border-radius:6px;
    border:1px solid rgba(184,134,60,0.5);
    background:transparent;
    color:var(--gold-light);
    cursor:pointer;
    transition:background .15s ease, color .15s ease, opacity .15s ease;
  }
  .btn:hover{background:rgba(184,134,60,0.15);}
  .btn.primary{
    background:var(--gold);
    color:var(--maroon-deep);
    border-color:var(--gold);
  }
  .btn.primary:hover{background:var(--gold-light);}
  .btn.subtle{color:#e8ddc7;border-color:rgba(232,221,199,0.28);}
  .btn[hidden]{display:none;}
  .mode-pill{
    border:1px solid rgba(217,184,114,0.4);
    border-radius:999px;
    color:#e8ddc7;
    font-size:12px;
    font-weight:800;
    letter-spacing:0.7px;
    padding:8px 12px;
    text-transform:uppercase;
  }

  /* ---------- Page / Paper ---------- */
  .page-wrap{
    display:flex;
    justify-content:center;
    padding:40px 16px 90px;
  }
  .paper{
    position:relative;
    width:min(820px, 100%);
    background:var(--ivory);
    box-shadow:0 28px 55px -28px var(--paper-shadow);
    padding:56px 60px 48px;
    animation:riseIn .5s ease both;
  }
  @keyframes riseIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  @media (prefers-reduced-motion: reduce){ .paper{animation:none;} }

  .corner{position:absolute;width:56px;height:56px;pointer-events:none;}
  .corner-tl{top:14px;left:14px;}
  .corner-tr{top:14px;right:14px;transform:scaleX(-1);}
  .corner-bl{bottom:14px;left:14px;transform:scaleY(-1);}
  .corner-br{bottom:14px;right:14px;transform:scale(-1,-1);}

  /* ---------- Header ---------- */
  .doc-header{
    display:flex;
    align-items:center;
    gap:28px;
    margin-bottom:18px;
  }
  .photo-frame{
    flex:none;
    width:128px;
    height:160px;
    border:3px solid var(--gold);
    padding:4px;
    background:#fff;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  body.edit-mode .photo-frame{cursor:pointer;}
  .photo-frame img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
    transform-origin:center;
    display:block;
  }
  .photo-placeholder{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    color:var(--muted);
    font-size:11px;
    text-align:center;
    padding:8px;
  }
  .photo-placeholder svg{width:34px;height:34px;opacity:.6;}
  .photo-tools{
    display:none;
    flex-direction:column;
    gap:8px;
    margin-top:10px;
    padding:10px;
    border:1px dashed rgba(31,78,66,0.28);
    border-radius:8px;
    background:rgba(255,255,255,0.35);
  }
  body.edit-mode .photo-tools{display:flex;}
  .photo-tools label{
    display:grid;
    grid-template-columns:64px 1fr;
    align-items:center;
    gap:8px;
    color:var(--emerald);
    font-size:12px;
    font-weight:800;
  }
  .photo-tools input{width:100%;}
  .photo-block{flex:none;width:128px;}
  .header-text{flex:1;min-width:0;}
  .eyebrow{
    margin:0 0 4px;
    text-transform:uppercase;
    letter-spacing:3px;
    font-size:12px;
    font-weight:700;
    color:var(--gold);
  }
  .name{
    margin:0;
    font-family:'Cormorant Garamond',serif;
    font-weight:700;
    font-size:44px;
    line-height:1.1;
    color:var(--maroon);
    letter-spacing:0.5px;
    word-break:break-word;
  }

  .top-divider{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin:8px 0 30px;
  }
  .top-divider .line{flex:1;height:1px;background:linear-gradient(90deg, transparent, var(--gold) 20%, var(--gold) 80%, transparent);}
  .top-divider svg{flex:none;}

  /* ---------- Sections ---------- */
  .biodata-section{
    margin-bottom:26px;
    break-inside:avoid;
    page-break-inside:avoid;
  }
  .section-head{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
  }
  .section-glyph{flex:none;}
  .section-title{
    margin:0;
    font-family:'Cormorant Garamond',serif;
    font-weight:600;
    font-size:20px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--maroon);
    flex:1;
    min-width:0;
  }
  .sec-del{
    flex:none;
    width:22px;height:22px;
    border-radius:50%;
    border:1px solid var(--muted);
    background:transparent;
    color:var(--muted);
    cursor:pointer;
    font-size:13px;
    line-height:1;
    display:none;align-items:center;justify-content:center;
    opacity:.55;
    transition:opacity .15s, color .15s, border-color .15s;
  }
  body.edit-mode .sec-del{display:flex;}
  .sec-del:hover{opacity:1;color:var(--maroon);border-color:var(--maroon);}

  .section-intro{
    margin:0 0 12px;
    font-size:14.5px;
    line-height:1.65;
    color:var(--ink);
  }
  .placeholder-text{color:var(--muted) !important;font-style:italic;}

  .fields-list{display:flex;flex-direction:column;gap:7px;}
  .field-row{
    display:grid;
    grid-template-columns:200px 14px 1fr 22px;
    align-items:start;
    gap:2px;
    font-size:14.5px;
    line-height:1.5;
  }
  .field-label{font-weight:700;color:var(--emerald);}
  .field-sep{color:var(--muted);}
  .field-value{color:var(--ink);}
  .field-label,.field-value{padding:2px 4px;border-radius:3px;}
  .row-del{
    flex:none;
    width:20px;height:20px;
    border-radius:50%;
    border:1px solid transparent;
    background:transparent;
    color:var(--muted);
    cursor:pointer;
    font-size:12px;
    opacity:0;
    display:none;align-items:center;justify-content:center;
    transition:opacity .12s;
  }
  body.edit-mode .row-del{display:flex;}
  body.edit-mode .field-row:hover .row-del{opacity:.6;border-color:var(--muted);}
  .row-del:hover{opacity:1 !important;color:var(--maroon);border-color:var(--maroon);}

  [contenteditable="true"]:focus{
    outline:1px dashed var(--gold);
    outline-offset:2px;
    background:rgba(184,134,60,0.08);
  }

  .add-field-btn, .add-section-btn{
    margin-top:8px;
    font-family:'Mulish',sans-serif;
    font-size:12.5px;
    font-weight:700;
    color:var(--emerald);
    background:transparent;
    border:1px dashed rgba(31,78,66,0.4);
    border-radius:5px;
    padding:6px 12px;
    cursor:pointer;
    display:none;
  }
  body.edit-mode .add-field-btn, body.edit-mode .add-section-btn{display:block;}
  .add-field-btn:hover{background:rgba(31,78,66,0.06);}
  .add-section-btn{
    width:100%;
    color:var(--gold);
    border:1px dashed rgba(184,134,60,0.5);
    padding:12px;
    font-size:13px;
    margin-top:10px;
  }
  .add-section-btn:hover{background:rgba(184,134,60,0.08);}

  .hint{
    text-align:center;
    font-size:11.5px;
    color:var(--muted);
    margin-top:10px;
  }
  .panel{
    width:min(820px, 100%);
    margin:0 auto 72px;
    padding:0 16px;
  }
  .changelog{
    display:none;
    background:rgba(255,250,240,0.86);
    border:1px solid rgba(184,134,60,0.32);
    border-radius:12px;
    box-shadow:0 18px 44px -30px rgba(0,0,0,0.32);
    padding:18px 20px;
  }
  .changelog.open{display:block;}
  .changelog h2{
    margin:0 0 10px;
    font-family:'Cormorant Garamond',serif;
    color:var(--maroon);
  }
  .changelog-list{
    margin:0;
    padding-left:20px;
    color:var(--ink);
    font-size:13px;
    line-height:1.55;
    max-height:220px;
    overflow:auto;
  }
  .changelog-empty{color:var(--muted);font-style:italic;}

  @media (max-width:640px){
    .paper{padding:34px 22px 30px;}
    .doc-header{flex-direction:column;text-align:center;}
    .name{font-size:32px;}
    .field-row{grid-template-columns:1fr;}
    .field-sep{display:none;}
    body.edit-mode .row-del{opacity:.6;}
    .toolbar{padding:12px 14px;}
  }

  /* ---------- Print ---------- */
  @media print{
    @page{size:A4;margin:14mm;}
    body{background:#fff;}
    .toolbar, .no-print, .panel{display:none !important;}
    .page-wrap{padding:0;}
    .paper{box-shadow:none;width:100%;padding:0;}
    .placeholder-text{display:none;}
    [contenteditable="true"]:focus{outline:none;background:none;}
  }
</style>
</head>
<body class="view-mode">

<div class="toolbar no-print">
  <div class="toolbar-brand">Biodata <span>Builder</span></div>
  <div class="toolbar-actions">
    <span class="mode-pill" id="modePill">View only</span>
    <button class="btn primary" id="editModeBtn">Enter edit mode</button>
    <button class="btn subtle" id="exitEditBtn" hidden>Exit edit mode</button>
    <button class="btn" id="addSectionTopBtn" hidden>+ Add section</button>
    <button class="btn" id="saveBtn" hidden>Save as .biodata</button>
    <button class="btn" id="loadBtn">Open saved file</button>
    <button class="btn" id="toggleLogBtn">Change log</button>
    <button class="btn" id="exportDocBtn">Export Word (.doc)</button>
    <button class="btn primary" id="exportPdfBtn">Export PDF</button>
    <input type="file" id="loadInput" accept=".biodata,.json,application/json" hidden>
  </div>
</div>

<div class="page-wrap">
  <div class="paper" id="paper">
    <svg class="corner corner-tl" viewBox="0 0 60 60"><path d="M4 40 C4 15, 15 4, 40 4" fill="none" stroke="var(--gold)" stroke-width="2"/><path d="M10 34 C10 20, 20 10, 34 10" fill="none" stroke="var(--gold)" stroke-width="1.2" opacity="0.55"/><circle cx="4" cy="46" r="3" fill="var(--gold)"/><circle cx="46" cy="4" r="3" fill="var(--gold)"/></svg>
    <svg class="corner corner-tr" viewBox="0 0 60 60"><path d="M4 40 C4 15, 15 4, 40 4" fill="none" stroke="var(--gold)" stroke-width="2"/><path d="M10 34 C10 20, 20 10, 34 10" fill="none" stroke="var(--gold)" stroke-width="1.2" opacity="0.55"/><circle cx="4" cy="46" r="3" fill="var(--gold)"/><circle cx="46" cy="4" r="3" fill="var(--gold)"/></svg>
    <svg class="corner corner-bl" viewBox="0 0 60 60"><path d="M4 40 C4 15, 15 4, 40 4" fill="none" stroke="var(--gold)" stroke-width="2"/><path d="M10 34 C10 20, 20 10, 34 10" fill="none" stroke="var(--gold)" stroke-width="1.2" opacity="0.55"/><circle cx="4" cy="46" r="3" fill="var(--gold)"/><circle cx="46" cy="4" r="3" fill="var(--gold)"/></svg>
    <svg class="corner corner-br" viewBox="0 0 60 60"><path d="M4 40 C4 15, 15 4, 40 4" fill="none" stroke="var(--gold)" stroke-width="2"/><path d="M10 34 C10 20, 20 10, 34 10" fill="none" stroke="var(--gold)" stroke-width="1.2" opacity="0.55"/><circle cx="4" cy="46" r="3" fill="var(--gold)"/><circle cx="46" cy="4" r="3" fill="var(--gold)"/></svg>

    <header class="doc-header">
      <div class="photo-block">
        <div class="photo-frame no-print-border" id="photoFrame" title="Enter edit mode to add a photo">
          <img id="photoImg" alt="Photo" hidden>
          <div class="photo-placeholder" id="photoPlaceholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.5-6 8-6s8 2 8 6"/></svg>
            <span>Add photo</span>
          </div>
          <input type="file" id="photoInput" accept="image/*" hidden>
        </div>
        <div class="photo-tools no-print" id="photoTools">
          <label>Zoom <input type="range" id="photoZoom" min="1" max="2.5" value="1" step="0.01"></label>
          <label>X Align <input type="range" id="photoX" min="0" max="100" value="50" step="1"></label>
          <label>Y Align <input type="range" id="photoY" min="0" max="100" value="50" step="1"></label>
        </div>
      </div>
      <div class="header-text">
        <p class="eyebrow editable" id="eyebrowField">Marriage Biodata</p>
        <h1 class="name editable" id="nameField">Vinil Saxena</h1>
      </div>
    </header>

    <div class="top-divider no-print-border">
      <div class="line"></div>
      <svg width="16" height="16" viewBox="0 0 16 16"><rect x="2" y="2" width="12" height="12" transform="rotate(45 8 8)" fill="var(--gold)"/></svg>
      <div class="line"></div>
    </div>

    <div id="sectionsContainer"></div>

    <button class="add-section-btn no-print" id="addSectionBottomBtn">+ Add new section</button>
    <p class="hint no-print" id="modeHint">View-only mode is active. Use Enter edit mode to make changes.</p>
  </div>
</div>

<div class="panel no-print">
  <aside class="changelog" id="changelogPanel">
    <h2>Change log</h2>
    <ol class="changelog-list" id="changelogList"></ol>
  </aside>
</div>

<script>
(function(){
  const AUTH_CODE = '1042';
  const FILE_VERSION = 1;
  const sectionsContainer = document.getElementById('sectionsContainer');
  const editModeBtn = document.getElementById('editModeBtn');
  const exitEditBtn = document.getElementById('exitEditBtn');
  const modePill = document.getElementById('modePill');
  const modeHint = document.getElementById('modeHint');
  const addSectionTopBtn = document.getElementById('addSectionTopBtn');
  const saveBtn = document.getElementById('saveBtn');
  const loadBtn = document.getElementById('loadBtn');
  const loadInput = document.getElementById('loadInput');
  const toggleLogBtn = document.getElementById('toggleLogBtn');
  const changelogPanel = document.getElementById('changelogPanel');
  const changelogList = document.getElementById('changelogList');
  let editMode = false;
  let changeLog = [];

  const defaultSections = [
    {
      title: 'Profile',
      intro: 'Vinil is a caring, kind-hearted and well-groomed professional - fun-loving, wise and open-minded, with a good sense of humor. He currently works as a Sales Development Manager at a well-reputed US MNC and is financially independent, with strong interpersonal skills. His interests include travelling, football and music. Looking for a match who is career-oriented, respectful of elders and warm towards family.',
      fields: []
    },
    {
      title: 'Education',
      intro: '',
      fields: [
        {label:'B. Tech (Computer Science Engineering)', value:'Amity University, Noida (U.P.)'},
        {label:'High School', value:'Delhi Public School - Rewari'}
      ]
    },
    {
      title: 'Current Job - Rippling',
      intro: '',
      fields: [
        {label:'Designation', value:'Manager, Sales Development'},
        {label:'Salary', value:'₹30 - 35 Lakh'},
        {label:'Workplace', value:'Bangalore'}
      ]
    },
    {
      title: 'Personal Information',
      intro: '',
      fields: [
        {label:'Caste', value:'Kayastha'},
        {label:'Born', value:'January 1994'},
        {label:'Place of Birth', value:'Gwalior, MP'},
        {label:'Height', value:"6.0'"},
        {label:'Diet', value:'Non-vegetarian'}
      ]
    },
    {
      title: 'Family Information',
      intro: 'Upper middle-class family originally from Gwalior, with a strong base in Delhi NCR. Currently residing in Panaji, Goa.',
      fields: [
        {label:'Father', value:'Associate Vice President - Operations, US MNC (based in Goa)'},
        {label:'Mother', value:'Homemaker'},
        {label:'Younger Brother', value:'B.Tech (Mechanical Engineering), MBA (IMI, New Delhi), US MNC'},
        {label:'Chachaji', value:'Product Development Head, reputed company in Noida'},
        {label:'Mamaji', value:'Renowned Lawyer, Vidarbha region (near Nagpur)'},
        {label:'Mausaji', value:'CA, Director at a Big 4 firm, Gurugram'},
        {label:'Tauji', value:'Doctors, settled in the US, Delhi and Noida'}
      ]
    },
    {
      title: 'Contact',
      intro: '',
      fields: [
        {label:'Phone', value:'9996205515 (Mother)'},
        {label:'Email', value:'Sunilsaxena2915@gmail.com (Father)'}
      ]
    }
  ];

  function addChange(message){
    changeLog.unshift({message, at: new Date().toISOString()});
    renderChangeLog();
  }

  function renderChangeLog(){
    changelogList.innerHTML = '';
    if(!changeLog.length){
      const item = document.createElement('li');
      item.className = 'changelog-empty';
      item.textContent = 'No edits tracked yet.';
      changelogList.appendChild(item);
      return;
    }
    changeLog.forEach(entry => {
      const item = document.createElement('li');
      item.textContent = `${new Date(entry.at).toLocaleString()} - ${entry.message}`;
      changelogList.appendChild(item);
    });
  }

  function setEditableState(){
    document.body.classList.toggle('edit-mode', editMode);
    document.body.classList.toggle('view-mode', !editMode);
    modePill.textContent = editMode ? 'Editing' : 'View only';
    modeHint.textContent = editMode
      ? 'Editing is active. Save your biodata file when you want to keep your progress.'
      : 'View-only mode is active. Use Enter edit mode to make changes.';
    editModeBtn.hidden = editMode;
    exitEditBtn.hidden = !editMode;
    addSectionTopBtn.hidden = !editMode;
    saveBtn.hidden = !editMode;
    document.querySelectorAll('.editable').forEach(el => {
      el.contentEditable = editMode ? 'true' : 'false';
    });
  }

  function attachPlaceholderBehavior(el, placeholder, multiline){
    function markPlaceholder(){
      el.textContent = placeholder;
      el.dataset.isPlaceholder = '1';
      el.classList.add('placeholder-text');
    }
    if(el.textContent.trim() === ''){ markPlaceholder(); }
    el.addEventListener('focus', function(){
      if(!editMode){ el.blur(); return; }
      if(el.dataset.isPlaceholder === '1'){
        el.textContent = '';
        el.dataset.isPlaceholder = '';
        el.classList.remove('placeholder-text');
      }
    });
    el.addEventListener('blur', function(){
      if(el.textContent.trim() === ''){ markPlaceholder(); }
    });
    el.addEventListener('input', function(){
      addChange(`Updated ${el.dataset.fieldName || 'content'}`);
    });
    if(!multiline){
      el.addEventListener('keydown', function(e){
        if(e.key === 'Enter'){ e.preventDefault(); el.blur(); }
      });
    }
  }

  function selectAllText(el){
    const range = document.createRange();
    range.selectNodeContents(el);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }

  function makeSectionGlyph(){
    const wrap = document.createElement('div');
    wrap.innerHTML = '<svg class="section-glyph" width="40" height="12" viewBox="0 0 40 12"><line x1="0" y1="6" x2="14" y2="6" stroke="#B8863C" stroke-width="1"/><rect x="17" y="3" width="6" height="6" transform="rotate(45 20 6)" fill="#B8863C"/><line x1="26" y1="6" x2="40" y2="6" stroke="#B8863C" stroke-width="1"/></svg>';
    return wrap.firstElementChild;
  }

  function createFieldRow(label, value, isNew){
    const row = document.createElement('div');
    row.className = 'field-row';

    const labelEl = document.createElement('span');
    labelEl.className = 'field-label editable';
    labelEl.dataset.fieldName = 'field label';
    labelEl.textContent = label;

    const sep = document.createElement('span');
    sep.className = 'field-sep';
    sep.textContent = ':';

    const valueEl = document.createElement('span');
    valueEl.className = 'field-value editable';
    valueEl.dataset.fieldName = 'field details';
    valueEl.textContent = value;

    const delBtn = document.createElement('button');
    delBtn.className = 'row-del no-print';
    delBtn.title = 'Remove field';
    delBtn.innerHTML = '&times;';
    delBtn.addEventListener('click', () => {
      row.remove();
      addChange('Removed a field');
    });

    attachPlaceholderBehavior(labelEl, 'Label', false);
    attachPlaceholderBehavior(valueEl, 'Details', false);

    row.append(labelEl, sep, valueEl, delBtn);
    setEditableState();

    if(isNew){
      setTimeout(() => { labelEl.focus(); selectAllText(labelEl); }, 0);
    }
    return row;
  }

  function createSection(data, isNew){
    const section = document.createElement('section');
    section.className = 'biodata-section';

    const head = document.createElement('div');
    head.className = 'section-head';

    const glyph = makeSectionGlyph();

    const titleEl = document.createElement('h2');
    titleEl.className = 'section-title editable';
    titleEl.dataset.fieldName = 'section title';
    titleEl.textContent = data.title;
    titleEl.addEventListener('keydown', function(e){
      if(e.key === 'Enter'){ e.preventDefault(); titleEl.blur(); }
    });
    titleEl.addEventListener('input', () => addChange('Updated section title'));

    const secDel = document.createElement('button');
    secDel.className = 'sec-del no-print';
    secDel.title = 'Remove section';
    secDel.innerHTML = '&times;';
    secDel.addEventListener('click', () => {
      section.remove();
      addChange(`Removed section "${titleEl.innerText.trim() || 'Untitled'}"`);
    });

    head.append(glyph, titleEl, secDel);

    const introEl = document.createElement('p');
    introEl.className = 'section-intro editable';
    introEl.dataset.fieldName = 'section note';
    introEl.textContent = data.intro || '';
    attachPlaceholderBehavior(introEl, 'Add a short note for this section (optional)', true);

    const fieldsList = document.createElement('div');
    fieldsList.className = 'fields-list';
    (data.fields || []).forEach(f => fieldsList.appendChild(createFieldRow(f.label, f.value, false)));

    const addFieldBtn = document.createElement('button');
    addFieldBtn.className = 'add-field-btn no-print';
    addFieldBtn.textContent = '+ Add field';
    addFieldBtn.addEventListener('click', () => {
      fieldsList.appendChild(createFieldRow('Label', 'Details', true));
      addChange(`Added a field to "${titleEl.innerText.trim() || 'Untitled'}"`);
    });

    section.append(head, introEl, fieldsList, addFieldBtn);
    setEditableState();

    if(isNew){
      setTimeout(() => { selectAllText(titleEl); titleEl.focus(); }, 0);
    }
    return section;
  }

  function readText(el){
    if(!el || el.dataset.isPlaceholder === '1') return '';
    return el.innerText.trim();
  }

  function getDocumentData(){
    return {
      version: FILE_VERSION,
      savedAt: new Date().toISOString(),
      eyebrow: readText(document.getElementById('eyebrowField')),
      name: readText(document.getElementById('nameField')),
      photo: {
        src: photoImg.hidden ? '' : photoImg.src,
        zoom: Number(photoZoom.value),
        x: Number(photoX.value),
        y: Number(photoY.value)
      },
      sections: Array.from(document.querySelectorAll('.biodata-section')).map(sec => ({
        title: readText(sec.querySelector('.section-title')),
        intro: readText(sec.querySelector('.section-intro')),
        fields: Array.from(sec.querySelectorAll('.field-row')).map(row => ({
          label: readText(row.querySelector('.field-label')),
          value: readText(row.querySelector('.field-value'))
        })).filter(field => field.label || field.value)
      })),
      changeLog
    };
  }

  function loadDocumentData(data){
    document.getElementById('eyebrowField').textContent = data.eyebrow || 'Marriage Biodata';
    document.getElementById('nameField').textContent = data.name || 'Full Name';
    sectionsContainer.innerHTML = '';
    (data.sections && data.sections.length ? data.sections : defaultSections)
      .forEach(s => sectionsContainer.appendChild(createSection(s, false)));
    if(data.photo && data.photo.src){
      photoImg.src = data.photo.src;
      photoImg.hidden = false;
      photoPlaceholder.hidden = true;
      photoZoom.value = data.photo.zoom || 1;
      photoX.value = data.photo.x || 50;
      photoY.value = data.photo.y || 50;
      applyPhotoCrop();
    } else {
      photoImg.removeAttribute('src');
      photoImg.hidden = true;
      photoPlaceholder.hidden = false;
      photoZoom.value = 1;
      photoX.value = 50;
      photoY.value = 50;
      applyPhotoCrop();
    }
    changeLog = Array.isArray(data.changeLog) ? data.changeLog : [];
    renderChangeLog();
    setEditableState();
  }

  function addNewSection(){
    if(!editMode) return;
    const section = createSection({title:'New Section', intro:'', fields:[{label:'Label', value:'Details'}]}, true);
    sectionsContainer.appendChild(section);
    addChange('Added a new section');
    section.scrollIntoView({behavior:'smooth', block:'center'});
  }

  function escapeHtml(str){
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function downloadBlob(content, filename, mime){
    const blob = new Blob(['\ufeff', content], {type: mime});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function applyPhotoCrop(){
    photoImg.style.objectPosition = `${photoX.value}% ${photoY.value}%`;
    photoImg.style.transform = `scale(${photoZoom.value})`;
  }

  addSectionTopBtn.addEventListener('click', addNewSection);
  document.getElementById('addSectionBottomBtn').addEventListener('click', addNewSection);

  editModeBtn.addEventListener('click', () => {
    const code = window.prompt('Enter the 4-digit edit code');
    if(code === AUTH_CODE){
      editMode = true;
      setEditableState();
      addChange('Entered edit mode');
    } else if(code !== null) {
      window.alert('Incorrect code. View-only mode remains active.');
    }
  });

  exitEditBtn.addEventListener('click', () => {
    editMode = false;
    setEditableState();
    addChange('Exited edit mode');
  });

  document.getElementById('nameField').dataset.fieldName = 'name';
  document.getElementById('eyebrowField').dataset.fieldName = 'document label';
  attachPlaceholderBehavior(document.getElementById('nameField'), 'Full Name', false);
  attachPlaceholderBehavior(document.getElementById('eyebrowField'), 'Marriage Biodata', false);

  const photoFrame = document.getElementById('photoFrame');
  const photoInput = document.getElementById('photoInput');
  const photoImg = document.getElementById('photoImg');
  const photoPlaceholder = document.getElementById('photoPlaceholder');
  const photoZoom = document.getElementById('photoZoom');
  const photoX = document.getElementById('photoX');
  const photoY = document.getElementById('photoY');

  photoFrame.addEventListener('click', () => {
    if(editMode) photoInput.click();
  });
  photoInput.addEventListener('change', () => {
    const file = photoInput.files && photoInput.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      photoImg.src = e.target.result;
      photoImg.hidden = false;
      photoPlaceholder.hidden = true;
      photoZoom.value = 1;
      photoX.value = 50;
      photoY.value = 50;
      applyPhotoCrop();
      addChange('Updated profile photo');
    };
    reader.readAsDataURL(file);
  });
  [photoZoom, photoX, photoY].forEach(input => {
    input.addEventListener('input', () => {
      applyPhotoCrop();
      addChange('Adjusted profile photo crop');
    });
  });

  saveBtn.addEventListener('click', () => {
    const data = getDocumentData();
    const name = data.name || 'Biodata';
    downloadBlob(JSON.stringify(data, null, 2), `${name.replace(/\s+/g,'_')}.biodata`, 'application/json');
    addChange('Saved a biodata file');
  });

  loadBtn.addEventListener('click', () => loadInput.click());
  loadInput.addEventListener('change', () => {
    const file = loadInput.files && loadInput.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        loadDocumentData(data);
        addChange(`Opened saved file "${file.name}"`);
      } catch (error) {
        window.alert('This file could not be opened. Please choose a valid .biodata file.');
      }
    };
    reader.readAsText(file);
  });

  toggleLogBtn.addEventListener('click', () => {
    changelogPanel.classList.toggle('open');
  });

  document.getElementById('exportPdfBtn').addEventListener('click', () => {
    window.print();
  });

  document.getElementById('exportDocBtn').addEventListener('click', () => {
    const data = getDocumentData();
    const name = data.name || 'Biodata';
    const eyebrow = data.eyebrow || '';
    let photoTag = '';
    if(data.photo.src){
      photoTag = `<img src="${data.photo.src}" width="150" height="188" style="border:3px solid #B8863C;padding:4px;object-fit:cover;object-position:${data.photo.x}% ${data.photo.y}%;" />`;
    }

    let sectionsHtml = '';
    data.sections.forEach(sec => {
      let fieldsHtml = '';
      sec.fields.forEach(field => {
        if(field.label || field.value){
          fieldsHtml += `<tr>
            <td style="padding:4px 10px 4px 0;font-weight:bold;color:#1F4E42;vertical-align:top;white-space:nowrap;">${escapeHtml(field.label)}</td>
            <td style="padding:4px 0;vertical-align:top;">:</td>
            <td style="padding:4px 0 4px 10px;vertical-align:top;">${escapeHtml(field.value)}</td>
          </tr>`;
        }
      });

      if(!sec.title && !sec.intro && !fieldsHtml) return;
      sectionsHtml += `
        <h2 style="color:#5B1220;border-bottom:1px solid #B8863C;padding-bottom:4px;font-family:Georgia,serif;font-size:16px;letter-spacing:1px;text-transform:uppercase;margin:22px 0 8px;">${escapeHtml(sec.title)}</h2>
        ${sec.intro ? `<p style="margin:0 0 10px;font-size:13px;line-height:1.6;">${escapeHtml(sec.intro).replace(/\n/g,'<br>')}</p>` : ''}
        ${fieldsHtml ? `<table style="border-collapse:collapse;font-size:13px;">${fieldsHtml}</table>` : ''}
      `;
    });

    const fullHtml = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
    <head><meta charset="utf-8"><title>${escapeHtml(name)}</title></head>
    <body style="font-family:Calibri,Arial,sans-serif;color:#2A1B12;">
      <table style="width:100%;margin-bottom:10px;"><tr>
        ${photoTag ? `<td style="width:160px;vertical-align:top;">${photoTag}</td>` : ''}
        <td style="vertical-align:middle;padding-left:20px;">
          <p style="text-transform:uppercase;letter-spacing:2px;color:#B8863C;font-size:11px;margin:0;">${escapeHtml(eyebrow)}</p>
          <h1 style="font-family:Georgia,serif;color:#5B1220;margin:4px 0;font-size:30px;">${escapeHtml(name)}</h1>
        </td>
      </tr></table>
      ${sectionsHtml}
    </body></html>`;

    downloadBlob(fullHtml, name.replace(/\s+/g,'_') + '_Biodata.doc', 'application/msword');
  });

  defaultSections.forEach(s => sectionsContainer.appendChild(createSection(s, false)));
  renderChangeLog();
  setEditableState();
})();
</script>
</body>
</html>
